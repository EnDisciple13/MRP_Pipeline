name: Supply planning docs mirror check

# Verifies that the mirrored supply-planning docs under
# docs/supply-planning/ match their canonical sources in the notes repo.
# The canonical files live in a separate repo, so this workflow checks it out
# alongside MRP_Pipeline and runs the sync script in --check mode.
#
# Requirement: the notes repo must be readable by Actions (public repo, or
# add a repo secret NOTES_REPO_TOKEN with read access if notes is private).

on:
  pull_request:
    paths:
      - "docs/supply-planning/**"
      - ".github/workflows/mirror-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/supply-planning/**"

jobs:
  mirror-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MRP_Pipeline
        uses: actions/checkout@v4
        with:
          path: MRP_Pipeline

      - name: Checkout notes (canonical sources)
        uses: actions/checkout@v4
        with:
          repository: endisciple13/notes
          path: notes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check mirrors are in sync
        run: python3 notes/scripts/sync_project_docs.py --check
